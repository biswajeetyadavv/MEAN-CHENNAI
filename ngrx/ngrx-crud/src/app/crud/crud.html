<p>crud works!</p>


<div class="container">
    <h2 class="m-4 text-center">NgRx CRUD Operations</h2>

    <table class="table table-dark table-center">
        <thead class="bg-secondary">
            <th class="col-3 p-2">ID</th>
            <th class="col-3 p-2">Title</th>
            <th class="col-3 p-2">Update</th>
            <th class="col-3 p-2">Delete</th>
        </thead>
        <tbody>
            <tr>
                <td>Id</td>
                <td>Title</td>
                <td><button class="btn btn-sm btn-primary m-1" (click)="UpdateData()">Update</button></td>
                <td><button class="btn btn-sm btn-danger m-1" (click)="DeleteData()">Delete</button></td>
            </tr>
        </tbody>
    </table>

    <div>
        <button class="btn btn-success btn-sm m-1" (click)="createData()">Create</button>

        <input type="text" class="mt-3" [(ngModel)]="newData" placeholder="Add new title" name="newData">

        <button class="btn btn-sm btn-warning m-1" (click)="addData(newData)">Add</button>
    </div>
</div>
